name = "rollick-broadcaster-redirect"
main = "src/index.js"
# Set to today's date on new projects; bump periodically on existing ones.
# Today: 2026-06-30. See https://developers.cloudflare.com/workers/configuration/compatibility-dates/
compatibility_date = "2026-06-30"

# Production observability — logs + traces show up in the Workers
# Observability dashboard. head_sampling_rate=1 captures 100% of logs
# (fine for low-traffic redirectors); traces sampled at 1% to manage
# volume. Adjust if traffic grows. See
# https://developers.cloudflare.com/workers/observability/
[observability]
enabled = true

[observability.logs]
head_sampling_rate = 1

[observability.traces]
enabled = true
head_sampling_rate = 0.01

# KV namespace binding.
#
# Two ways to create the namespace (pick one, do this once):
#
#   (a) Auto-provisioned on first `wrangler deploy` (v4 default):
#       Leave the `id` line commented out — wrangler creates the
#       namespace and writes the id back into this file.
#
#   (b) Explicit create now (no deploy needed):
#       wrangler kv namespace create BACKEND_URLS --update-config
#       Wrangler creates the namespace and writes the id here.
#
# After the id is set (either way), copy it to .env as CF_KV_NAMESPACE_ID
# so the host-side start-tunnel.sh script can write to it.
[[kv_namespaces]]
binding = "BACKEND_URLS"
id = "cd93ab4e025c47a9a8d0bc74d52f6474"
