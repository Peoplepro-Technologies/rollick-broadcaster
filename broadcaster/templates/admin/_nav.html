<header class="topbar">
  <a href="/admin/" class="topbar-brand">
    <img src="/static/img/logo.png" alt="Rollick">
  </a>
  <nav class="topbar-nav">
    <a href="/admin/" class="{% if active_nav == 'dashboard' %}active{% endif %}">Dashboard</a>
    <a href="/admin/users" class="{% if active_nav == 'users' %}active{% endif %}">Users</a>
    <a href="/admin/groups" class="{% if active_nav == 'groups' %}active{% endif %}">Groups</a>
    <a href="/admin/content" class="{% if active_nav == 'content' %}active{% endif %}">Content</a>
    <a href="/admin/broadcasts" class="{% if active_nav == 'broadcasts' %}active{% endif %}">Broadcasts</a>
    <a href="/admin/comments" class="{% if active_nav == 'comments' %}active{% endif %}">Comments</a>
    <a href="/admin/settings" class="{% if active_nav == 'settings' %}active{% endif %}">Settings</a>
  </nav>
  <div class="topbar-actions">
    <span class="who"><b>{{ admin.username }}</b> · admin</span>
    <form method="post" action="/api/auth/logout" style="margin:0;">
      <button type="submit" class="logout">Logout</button>
    </form>
  </div>
</header>
