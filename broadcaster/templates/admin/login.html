{% extends "base.html" %}
{% block title %}Sign in — {{ app_name }}{% endblock %}
{% block body_class %}login-shell{% endblock %}

{% block body %}
<div class="login-card">
  <div class="login-logo">📡</div>
  <h2>Sign in</h2>
  <p class="sub">{{ app_name }} — admin console</p>

  {% if error %}
  <div class="form-error">Invalid username or password.</div>
  {% endif %}

  <form id="login-form" method="post" action="/api/auth/login" autocomplete="off">
    <label for="username">Username</label>
    <input id="username" name="username" required autofocus>

    <label for="password" style="margin-top:14px;display:block;">Password</label>
    <input id="password" name="password" type="password" required>

    <button type="submit" class="btn" style="width:100%;margin-top:24px;justify-content:center;">
      Sign in
    </button>
  </form>
</div>
{% endblock %}
