{% extends "base.html" %}
{% block title %}Sign in — {{ app_name }}{% endblock %}
{% block body_class %}login-shell{% endblock %}

{% block body %}
<header class="login-topbar">
  <a href="/admin/login" class="topbar-brand">
    <img src="/static/img/logo.png" alt="Rollick">
  </a>
</header>

<section class="login-hero">
  <div class="login-card">
    <h2>Sign in</h2>
    <p class="sub">Admin console</p>

    {% if error %}
    <div class="form-error">Invalid username or password.</div>
    {% endif %}

    <form id="login-form" method="post" action="/api/auth/login" autocomplete="off">
      <label for="username">Username</label>
      <input id="username" name="username" required autofocus>

      <label for="password" style="margin-top:14px;display:block;">Password</label>
      <input id="password" name="password" type="password" required>

      <button type="submit" class="btn" style="width:100%;margin-top:24px;justify-content:center;">
        Sign in
      </button>

      <a href="/admin/forgot-password" class="muted"
         style="display:block; margin-top:14px; text-align:right; font-size: 13px;">
        Forgot password?
      </a>
    </form>
  </div>
</section>
{% endblock %}
